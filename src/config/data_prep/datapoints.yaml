# Datapoints to combine into training data. Each entry is loaded once; order preserved.
# path: relative to project root. loader: json (uses json_source_loader).
# scenario_type: security | qa | payload | tool (default: security).

datapoints:
  - id: exploit_portswigger
    path: data_points/exploit/portswigger_dataset.json
    loader: json
    scenario_type: security

  - id: exploit_invicti
    path: data_points/exploit/invicti_dataset.json
    loader: json
    scenario_type: security

  - id: exploit_juice_shop
    path: data_points/exploit/juiceshop_dataset.json
    loader: json
    scenario_type: security

  - id: exploit_n8n
    path: data_points/exploit/n8n_dataset.json
    loader: json
    scenario_type: security

  - id: reasoning_primus
    path: data_points/reasoning/primus_reasoning_dataset.yaml
    loader: json
    scenario_type: qa

