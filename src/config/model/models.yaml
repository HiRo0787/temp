  # Qwen3-30B (MoE Model)
  qwen3-30b:
    name: "Qwen/Qwen3-Coder-30B-A3B-Instruct"
    version: "qwen3"
    size: "30b"
    architecture: "Dense (30B parameters, Qwen3-Coder)"
    expected_vram: "~60GB (requires 80GB+ GPU for vLLM, will fallback to 14B if insufficient)"
    fallbacks: ["qwen3-14b", "qwen3-8b"]
    lora_target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    supported: true
    trust_remote_code: true

  # OpenPipe Qwen3 Model
  openpipe-14b:
    name: "OpenPipe/Qwen3-14B-Instruct"
    version: "qwen3"
    size: "14b"
    architecture: "Dense (14B parameters, OpenPipe Qwen3)"
    expected_vram: "~28GB (requires 40GB+ GPU for vLLM)"
    fallbacks: ["qwen2.5-14b"]
    lora_target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    supported: true
    trust_remote_code: true

# Default configurations
  gemma4-31b:
    name: "google/gemma-4-31B-it"
    version: "gemma4"
    size: "31b"
    architecture: "Dense (30.7B parameters, Gemma 4 Hybrid Attention)"
    expected_vram: "~61GB (Fits H100 80GB perfectly)"
    lora_target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    supported: true
    trust_remote_code: true

  # Gemma 4 Edge Model
  gemma4-e4b:
    name: "google/gemma-4-E4B-it"
    version: "gemma4"
    size: "e4b"
    architecture: "Dense + PLE (4.5B Effective / 8B Total parameters, Gemma 4 Hybrid Attention)"
    expected_vram: "~16GB (Fits in 20GB RTX 4000/A5000 in BF16)"
    fallbacks: ["qwen3-4b"]
    lora_target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    supported: true
    trust_remote_code: true

defaults:
  dtype: "bfloat16"
  use_unsloth: true
  gpu_memory: 80 
  lora_config:
    r: 16 
    lora_alpha: 128
    lora_dropout: 0.05  
    bias: "none"
    task_type: "CAUSAL_LM"

# Model selection aliases (for backward compatibility)
aliases:
  "7b": "qwen2.5-7b"
  "8b": "qwen3-8b"
  "9b": "qwen3.5-9b"
  "14b": "qwen2.5-14b"
  "30b": "qwen3-30b"
  "31b": "gemma4-31b"
  "32b": "qwen3-32b"
  "e4b": "gemma4-e4b"
  "qwen2.5": "qwen2.5-7b"
  "qwen3": "qwen3-32b"
  "gemma4": "gemma4-31b"
  "qwen3": "qwen3-8b"
  "qwen3.5": "qwen3.5-9b"

